name: Build and release binaries

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  POETRY_VERSION: "2.4.1"
  POETRY_PYINSTALLER_PLUGIN_VERSION: "2.0.3"

jobs:
  build:
    name: Build ${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            asset: linux-x86_64
          - runner: macos-15-intel
            asset: macos-x86_64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip pipx
          pipx install "poetry==$POETRY_VERSION"
          pipx inject poetry "poetry-pyinstaller-plugin==$POETRY_PYINSTALLER_PLUGIN_VERSION"

      - name: Install dependencies
        run: poetry install --no-interaction --with build

      - name: Run tests
        run: poetry run python -m unittest discover -s tests -v

      - name: Build binary
        run: poetry build

      - name: Prepare binary
        shell: bash
        run: |
          binary_path="$(find dist/pyinstaller -type f -name ptpt -print -quit)"
          test -n "$binary_path"
          install -m 755 "$binary_path" "dist/ptpt-${{ matrix.asset }}"

      - name: Inspect binary
        run: |
          test -x "dist/ptpt-${{ matrix.asset }}"
          file "dist/ptpt-${{ matrix.asset }}"

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: ptpt-${{ matrix.asset }}
          path: dist/ptpt-${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Create GitHub release
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download binaries
        uses: actions/download-artifact@v8
        with:
          pattern: ptpt-*
          path: dist/release
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: dist/release/ptpt-*
